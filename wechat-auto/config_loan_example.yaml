# 金融贷款咨询 - 企业微信自动回复系统配置
# 专门为贷款业务定制

wecom:
  corp_id: "wwxxxxxxxxxxxxxxx"          # 替换：你的企业ID
  secret: "xxxxxxxxxxxxxxxxxxxxxxxxxxxx" # 替换：你的应用Secret
  agent_id: 1000002                     # 替换：你的应用ID

# 贷款业务消息处理配置
message:
  # 贷款业务关键词触发规则
  keyword_triggers:
    # 利率利息相关
    - keywords: ["利率", "利息", "年化", "费率", "成本"]
      reply: |
        📊 **利率说明**：
        根据您的资质综合评估，年化利率范围：
        • 优质客户：4.5%-6.8%
        • 普通客户：7.2%-9.6%
        • 需要审核征信、收入等资料确定具体利率
        
        利息透明，无隐藏费用，合同明确标注。
    
    # 额度相关
    - keywords: ["额度", "能贷多少", "最高", "最多", "金额"]
      reply: |
        💳 **贷款额度**：1万元 - 50万元
        
        **额度决定因素**：
        1. 征信记录（无当前逾期）
        2. 收入证明（月收入≥3000元）
        3. 负债情况（负债率≤70%）
        4. 工作稳定性（现单位≥6个月）
        
        请提供基本信息，为您预估额度。
    
    # 期限相关
    - keywords: ["期限", "多久还", "分期", "期数", "还款"]
      reply: |
        📅 **贷款期限**：
        • 短期：3、6、12个月
        • 中期：24个月
        • 长期：36个月
        
        **还款方式**：
        • 等额本息（每月固定金额）
        • 可提前还款，无违约金
        • 自动扣款，方便省心
    
    # 申请要求
    - keywords: ["要求", "需要什么", "材料", "条件", "资格"]
      reply: |
        📝 **申请要求**：
        
        **基本条件**：
        1. 年龄22-55周岁
        2. 中国大陆居民
        3. 有稳定收入来源
        4. 信用记录良好
        
        **申请材料**：
        • 身份证正反面
        • 本人银行卡
        • 收入证明（近3个月流水）
        • 个人征信报告（可协助查询）
    
    # 办理流程
    - keywords: ["流程", "怎么办理", "步骤", "操作", "申请"]
      reply: |
        🚀 **办理流程**：
        
        1. **提交申请**（线上/微信）
        2. **资料审核**（1-2个工作日）
        3. **额度审批**（系统+人工审核）
        4. **合同签约**（电子合同）
        5. **放款到账**（最快当天）
        
        全程专人指导，简单便捷。
    
    # 征信相关
    - keywords: ["征信", "逾期", "信用", "黑名单", "记录"]
      reply: |
        📊 **征信要求**：
        
        **可接受情况**：
        • 无当前逾期
        • 近两年逾期≤6次
        • 非法院执行名单
        • 非银行黑名单
        
        **特殊处理**：
        • 轻微逾期（1-2次）可沟通
        • 需提供情况说明
        • 严重逾期暂无法办理
    
    # 放款时间
    - keywords: ["多久放款", "放款时间", "到账", "快吗", "效率"]
      reply: |
        ⚡ **放款时效**：
        
        • 资料齐全：审核1-2工作日
        • 审批通过：签约后2小时内放款
        • 特殊情况：最快30分钟到账
        • 大额贷款：需面审，1-3工作日
        
        我们追求效率，不耽误您用款。
    
    # 客服联系
    - keywords: ["客服", "联系", "电话", "微信", "经理"]
      reply: |
        👨‍💼 **专业服务**：
        
        **客户经理**：
        • 李经理：138-xxxx-xxxx
        • 微信同号（添加备注"贷款咨询"）
        
        **服务时间**：
        • 周一至周五：9:00-18:00
        • 周六：10:00-17:00
        • 紧急情况：24小时可留言
        
        **门店地址**：
        XX市XX区XX路XX号XX大厦X层
        
    # 安全保障
    - keywords: ["安全", "靠谱", "正规", "合法", "可靠"]
      reply: |
        🔒 **安全保障**：
        
        1. **持牌机构**：与多家持牌金融机构合作
        2. **资金安全**：银行资金监管，专款专用
        3. **信息保密**：数据加密，隐私保护
        4. **合规经营**：合法合规，合同受法律保护
        5. **透明收费**：无前置费用，成功才收费
    
    # 问候语
    - keywords: ["你好", "您好", "hello", "hi", "在吗"]
      reply: |
        👋 **欢迎咨询**！
        
        我是贷款咨询智能助手，很高兴为您服务。
        
        请告诉我您的需求：
        • 需要多少额度？
        • 用途是什么？
        • 期望的期限？
        
        或直接询问：利率、要求、流程等。
    
    # 感谢语
    - keywords: ["谢谢", "感谢", "thanks", "thank you"]
      reply: "🙏 不客气！很高兴为您服务。如有其他问题，随时咨询。"
    
    # 告别语
    - keywords: ["再见", "拜拜", "88", "bye", "下次"]
      reply: "👋 再见！祝您顺利解决问题，需要时随时回来咨询。"
  
  # 是否启用文档知识库（可放入贷款产品说明书等）
  enable_document_retrieval: false
  document_path: "./data/documents/"
  
  # 是否启用历史聊天学习（强烈建议启用）
  enable_chat_history_learning: true
  chat_history_path: "./data/history/"

# 日志配置
logging:
  level: "INFO"
  file: "./logs/loan_auto.log"

# 安全与合规配置
security:
  # 重要：贷款业务需谨慎，建议设置白名单
  allowed_users: []  # 空表示全部，建议初期设置测试用户
  
  # 防骚扰设置
  rate_limit:
    messages_per_minute: 15
    cooldown_seconds: 60
    
  # 敏感词过滤（贷款业务专用）
  sensitive_words: ["高利贷", "套路贷", "非法", "诈骗"]
  
  # 合规声明自动添加
  add_compliance_notice: true
  compliance_text: "【风险提示】借贷需谨慎，请根据自身还款能力理性借贷。"

# 业务专用功能
loan_business:
  # 客户意向识别
  enable_intention_detection: true
  intention_keywords:
    high: ["急需", "马上", "今天", "尽快", "确定要"]
    medium: ["考虑", "比较", "了解", "咨询", "看看"]
    low: ["随便问问", "了解一下", "没事", "好奇"]
  
  # 自动分配客户经理
  auto_assign_manager: true
  managers:
    - name: "李经理"
      phone: "138-xxxx-xxxx"
      wechat: "lijingli123"
    - name: "王经理"
      phone: "139-xxxx-xxxx"
      wechat: "wangjingli456"
  
  # 跟进提醒
  enable_follow_up: true
  follow_up_hours: 24  # 24小时后提醒跟进
  
  # 数据统计
  enable_statistics: true
  track_metrics:
    - "咨询量"
    - "意向客户数"
    - "常见问题排行"
    - "转化率"

# 高级功能（后续扩展）
advanced:
  # 是否使用大模型增强回复（用于复杂问题）
  enable_llm_enhancement: false
  llm_provider: "openai"
  
  # 是否集成CRM系统
  enable_crm_integration: false
  crm_type: ""  # 如：纷享销客、销售易等
  
  # 是否启用自动报表
  enable_auto_report: true
  report_schedule: "daily"  # daily, weekly, monthly